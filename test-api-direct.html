<!DOCTYPE html>
<html>
<head>
    <title>直接 API 测试</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        textarea { width: 100%; height: 400px; }
        button { padding: 10px 20px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>GitHub API 直接测试</h1>
    <p>Token: <input type="password" id="token" style="width: 300px;" placeholder="输入你的 Token"></p>
    <button onclick="testAPI()">发送请求</button>
    <button onclick="clearOutput()">清空</button>
    <h2>原始响应:</h2>
    <textarea id="output" readonly></textarea>

    <script>
        function log(msg) {
            const output = document.getElementById('output');
            output.value += msg + '\n';
            output.scrollTop = output.scrollHeight;
        }

        function clearOutput() {
            document.getElementById('output').value = '';
        }

        async function testAPI() {
            clearOutput();
            const token = document.getElementById('token').value;
            if (!token) {
                log('请输入 Token');
                return;
            }

            const url = 'https://api.github.com/repos/BobWang21/learning/contents/ai-agent-rag.html';

            log('=== 请求信息 ===');
            log(`URL: ${url}`);
            log(`Token: ${token.substring(0, 10)}...`);
            log('');

            try {
                log('发送 fetch 请求...');
                const urlWithCache = url + '?t=' + Date.now();
                log(`实际 URL: ${urlWithCache}\n`);
                const response = await fetch(urlWithCache, {
                    method: 'GET',
                    cache: 'no-store',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/json',
                        'User-Agent': 'Mozilla/5.0',
                        'X-GitHub-Api-Version': '2022-11-28'
                    }
                });

                log(`\n=== 响应信息 ===`);
                log(`状态码: ${response.status} ${response.statusText}`);
                log(`Content-Type: ${response.headers.get('content-type')}`);
                log(`Content-Length: ${response.headers.get('content-length')}`);

                const text = await response.text();
                log(`\n=== 响应内容 (前 2000 字符) ===`);
                log(text.substring(0, 2000));

                log(`\n=== 分析 ===`);
                log(`总长度: ${text.length} 字符`);
                log(`是否以 { 开头: ${text.startsWith('{')}`);
                log(`是否以 < 开头: ${text.startsWith('<')}`);

                if (text.startsWith('{')) {
                    try {
                        const json = JSON.parse(text);
                        log(`✓ 成功解析为 JSON`);
                        log(`文件名: ${json.name}`);
                        log(`SHA: ${json.sha}`);
                    } catch (e) {
                        log(`✗ JSON 解析失败: ${e.message}`);
                    }
                }
            } catch (error) {
                log(`✗ 错误: ${error.message}`);
                log(`${error.stack}`);
            }
        }

        // 页面加载时提示
        window.addEventListener('load', () => {
            log('页面已加载，请输入 Token 并点击"发送请求"');
        });
    </script>
</body>
</html>
